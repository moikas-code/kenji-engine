<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kenji Pong - Classic Arcade Game</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Courier New", monospace;
        color: white;
      }

      #gameContainer {
        text-align: center;
        border: 3px solid #00ff41;
        border-radius: 10px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.8);
        box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
      }

      #gameCanvas {
        border: 2px solid #00ff41;
        background: #000;
        display: block;
        margin: 0 auto;
      }

      .game-info {
        margin-top: 15px;
        color: #00ff41;
        font-size: 14px;
      }

      .controls {
        margin-top: 10px;
        font-size: 12px;
        color: #888;
      }

      .title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 15px;
        text-shadow: 0 0 10px #00ff41;
      }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <div class="title">🎮 KENJI PONG</div>
      <canvas id="gameCanvas" width="800" height="400"></canvas>
      <div class="game-info">
        <div>Classic Pong • Built with Kenji Game Engine</div>
      </div>
      <div class="controls">
        <div>
          Player 1: W/S Keys • Player 2: ↑/↓ Arrow Keys • Space: Pause • R:
          Reset
        </div>
      </div>
    </div>
    <script type="module" src="dist/main.js"></script>
  </body>
</html>
