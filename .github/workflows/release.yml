name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run publish
          title: "Release: Version Packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.changesets.outputs.publishedPackages[0].version }}
          release_name: Release v${{ steps.changesets.outputs.publishedPackages[0].version }}
          body: |
            ## Changes

            ${{ steps.changesets.outputs.publishedPackages[0].changelog }}

            ## Packages Released

            ${{ steps.changesets.outputs.publishedPackages }}
          draft: false
          prerelease: false

  validate-packages:
    name: Validate Published Packages
    runs-on: ubuntu-latest
    needs: release
    if: steps.changesets.outputs.published == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Test package installation from npm
        run: |
          # Wait a bit for npm to propagate
          sleep 30

          # Test installing the published package
          mkdir test-published
          cd test-published
          npm init -y
          npm install @kuuzuki-ge/core@latest

          # Verify the package works
          node -e "
            const engine = require('@kuuzuki-ge/core');
            console.log('Package installed and imported successfully');
            console.log('Available exports:', Object.keys(engine));
          "

      - name: Update documentation
        run: |
          echo "📦 New version published successfully!" >> $GITHUB_STEP_SUMMARY
          echo "Users can now install with: \`npm install @kuuzuki-ge/core@latest\`" >> $GITHUB_STEP_SUMMARY
